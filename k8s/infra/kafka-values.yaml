global:
  security:
    allowInsecureImages: true
  imageRegistry: ""

image:
  registry: docker.io
  repository: confluentinc/cp-kafka
  tag: "7.8.0"
  pullPolicy: IfNotPresent

controller:
  replicaCount: 1
  persistence:
    enabled: true
    size: 2Gi
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 1Gi
      cpu: "1"

broker:
  replicaCount: 0

listeners:
  client:
    protocol: PLAINTEXT
  controller:
    protocol: PLAINTEXT

extraConfig: |
  auto.create.topics.enable=true
  offsets.topic.replication.factor=1
  transaction.state.log.replication.factor=1
  transaction.state.log.min.isr=1