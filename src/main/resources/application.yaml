server:
  port: 8083

spring:
  application:
    name: arm-support-service

  config:
    import: optional:file:./secrets.yaml

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 25MB

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}?currentSchema=${POSTGRES_SCHEMA}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: ${POSTGRES_SCHEMA}
        format_sql: true
    open-in-view: false

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    default-schema: ${POSTGRES_SCHEMA}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      group-id: arm-support-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false
      properties:
        max.poll.records: 10

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${USER_SERVICE_URL}

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  endpoints:
    web:
      exposure:
        include: health
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

app:
  front-url: ${APP_FRONT_URL}
  kafka:
    topics:
      user-sync: user-sync
      email-conversation-created: email.conversation.created
      email-conversation-matched: email.conversation.matched
      email-inbound-persisted: email.inbound.persisted
      email-outbound-requested: email.outbound.requested
      email-outbound-sent: email.outbound.sent
      email-outbound-failed: email.outbound.failed
      vk-message-received: vk.message.received
      vk-message-sent: vk.message.sent
      vk-message-failed: vk.message.failed
  email-integration:
    base-url: ${EMAIL_INTEGRATION_URL}
    kafka-consumers-enabled: true
  vk-integration:
    base-url: ${VK_SERVICE_URL:http://localhost:8085}
    kafka-consumers-enabled: true
    read-timeout-millis: 60000
