spring:
  application:
    name: arm-support-service

  datasource:
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: arm_support
    open-in-view: false

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
    default-schema: arm_support

  kafka:
    bootstrap-servers: localhost:9092

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080

app:
  front-url: http://localhost:3000
  kafka:
    topics:
      user-sync: user-sync-test
      email-conversation-created: email.conversation.created.test
      email-conversation-matched: email.conversation.matched.test
      email-inbound-persisted: email.inbound.persisted.test
      email-outbound-requested: email.outbound.requested.test
      email-outbound-sent: email.outbound.sent.test
      email-outbound-failed: email.outbound.failed.test
  email-integration:
    base-url: http://localhost:9999
    kafka-consumers-enabled: true
